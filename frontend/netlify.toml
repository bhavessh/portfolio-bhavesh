[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  PUBLIC_API_URL = "https://portfolio-cms-backend.onrender.com/api"

[[redirects]]
  from = "/api/*"
  to = "https://portfolio-cms-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
