services:
  # Frontend Static Site
  - type: web
    name: portfolio-bhavesh
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: PUBLIC_API_URL
        value: https://portfolio-cms-backend.onrender.com/api
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /_astro/*
        destination: /_astro/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend API Service
  - type: web
    name: portfolio-cms-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
